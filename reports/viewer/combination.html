<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manual load combination</title>
  <style>
    :root { color-scheme: light; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #0f172a; color: #e5e7eb; }
    .viewer-page { min-height: 100vh; padding: 20px; box-sizing: border-box; }
    .viewer-header { max-width: 1500px; margin: 0 auto 12px auto; }
    .viewer-header h1 { margin: 0 0 6px 0; font-size: 28px; }
    .viewer-header p { margin: 0; color: #cbd5e1; }
    .toolbar { max-width: 1500px; margin: 0 auto 12px auto; padding: 12px; display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: center; background: #111827; border: 1px solid #334155; border-radius: 12px; }
    .toolbar button { border: 1px solid #475569; background: #1f2937; color: #f8fafc; border-radius: 8px; padding: 7px 10px; cursor: pointer; }
    .toolbar button:hover { background: #374151; }
    .toolbar label { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: #e2e8f0; }
    .viewer-shell { max-width: 1500px; margin: 0 auto; border: 1px solid #334155; border-radius: 14px; background: #020617; overflow: hidden; box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35); }
    .viewer-canvas { height: min(78vh, 920px); overflow: hidden; cursor: grab; touch-action: none; }
    .viewer-canvas.dragging { cursor: grabbing; }
    .viewer-canvas svg { width: 100%; height: 100%; display: block; background: #ffffff; }
    .summary { max-width: 1500px; margin: 12px auto 0 auto; display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 10px; }
    .summary div { background: #111827; border: 1px solid #334155; border-radius: 10px; padding: 10px; }
    .summary dt { color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; }
    .summary dd { margin: 4px 0 0 0; font-weight: 700; color: #f8fafc; }
    .hidden-layer { display: none !important; }
  </style>
</head>
<body>
  <main class="viewer-page">
    <header class="viewer-header">
      <h1>Manual load combination</h1>
      <p>Simply supported beam with permanent and variable uniform loads combined manually.</p>
    </header>

      <button type="button" data-action="zoom-in">Zoom +</button>

      <label><input type="checkbox" data-layer="#deformed-shape" checked /> Deformed</label>
      <label><input type="checkbox" data-layer="#diagrams" checked /> Diagrams</label>
      <label><input type="checkbox" data-layer=".support" checked /> Supports</label>
      <label><input type="checkbox" data-layer=".reaction,.reaction-label" checked /> Reactions</label>
      <label><input type="checkbox" data-layer=".dimension,.dimension-extension,.dimension-label" checked /> Dimensions</label>

    </nav>

  <script>
    (() => {
      const canvas = document.getElementById('viewerCanvas');
      const svg = canvas.querySelector('svg');
      const original = svg.viewBox.baseVal;
      let viewBox = { x: original.x, y: original.y, width: original.width, height: original.height };
      let dragging = false;
      let last = { x: 0, y: 0 };
      function applyViewBox() { svg.setAttribute('viewBox', `${viewBox.x} ${viewBox.y} ${viewBox.width} ${viewBox.height}`); }
      function zoom(factor, clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        const px = clientX === undefined ? rect.left + rect.width / 2 : clientX;
        const py = clientY === undefined ? rect.top + rect.height / 2 : clientY;
        const mx = viewBox.x + ((px - rect.left) / rect.width) * viewBox.width;
        const my = viewBox.y + ((py - rect.top) / rect.height) * viewBox.height;
        const newWidth = viewBox.width * factor;
        const newHeight = viewBox.height * factor;
        viewBox.x = mx - ((mx - viewBox.x) * factor);
        viewBox.y = my - ((my - viewBox.y) * factor);
        viewBox.width = newWidth;
        viewBox.height = newHeight;
        applyViewBox();
      }
      canvas.addEventListener('wheel', event => { event.preventDefault(); zoom(event.deltaY < 0 ? 0.9 : 1.1, event.clientX, event.clientY); }, { passive: false });
      canvas.addEventListener('pointerdown', event => { dragging = true; last = { x: event.clientX, y: event.clientY }; canvas.classList.add('dragging'); canvas.setPointerCapture(event.pointerId); });
      canvas.addEventListener('pointermove', event => {
        if (!dragging) return;
        const rect = svg.getBoundingClientRect();
        const dx = (event.clientX - last.x) / rect.width * viewBox.width;
        const dy = (event.clientY - last.y) / rect.height * viewBox.height;
        viewBox.x -= dx;
        viewBox.y -= dy;
        last = { x: event.clientX, y: event.clientY };
        applyViewBox();
      });
      canvas.addEventListener('pointerup', event => { dragging = false; canvas.classList.remove('dragging'); canvas.releasePointerCapture(event.pointerId); });
      document.querySelector('[data-action=zoom-in]').addEventListener('click', () => zoom(0.85));
      document.querySelector('[data-action=zoom-out]').addEventListener('click', () => zoom(1.15));
      document.querySelector('[data-action=reset]').addEventListener('click', () => { viewBox = { x: original.x, y: original.y, width: original.width, height: original.height }; applyViewBox(); });
      document.querySelectorAll('[data-layer]').forEach(control => {
        function applyLayerVisibility() {
          control.dataset.layer.split(',').forEach(selector => {
            svg.querySelectorAll(selector.trim()).forEach(element => element.classList.toggle('hidden-layer', !control.checked));
          });
        }
        control.addEventListener('change', applyLayerVisibility);
        applyLayerVisibility();
      });
      applyViewBox();
    })();
  </script>
